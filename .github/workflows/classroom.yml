name: Autograding Tests
on:
  - push
  - workflow_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile soal2
        run: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c

      - name: Test Case 1
        id: tc1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC1 - contoh resmi"
          setup-command: ""
          command: bash -c 'out=$(printf "20 0 100 4 1 15 3 2 2 10 1 1\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "AMAN 61" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 2
        id: tc2
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC2 - gagal batas atas"
          setup-command: ""
          command: bash -c 'out=$(printf "90 0 100 1 1 20\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "GAGAL 1 110" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 3
        id: tc3
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC3 - gagal batas bawah"
          setup-command: ""
          command: bash -c 'out=$(printf "5 0 100 1 2 10\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "GAGAL 1 -5" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 4
        id: tc4
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC4 - cap menurunkan"
          setup-command: ""
          command: bash -c 'out=$(printf "50 0 100 1 4 20\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "AMAN 20" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 5
        id: tc5
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC5 - cap tidak mengubah"
          setup-command: ""
          command: bash -c 'out=$(printf "15 0 100 1 4 20\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "AMAN 15" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 6
        id: tc6
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC6 - gagal langkah 2"
          setup-command: ""
          command: bash -c 'out=$(printf "10 0 30 3 1 5 3 3 2 1\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "GAGAL 2 45" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 7
        id: tc7
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC7 - tepat batas aman"
          setup-command: ""
          command: bash -c 'out=$(printf "20 0 100 2 2 20 1 100\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "AMAN 100" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 8
        id: tc8
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC8 - mul lalu aman"
          setup-command: ""
          command: bash -c 'out=$(printf "4 0 20 2 3 3 1 2\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "AMAN 14" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 9
        id: tc9
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC9 - cap lalu sub"
          setup-command: ""
          command: bash -c 'out=$(printf "100 0 100 2 4 50 2 10\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "AMAN 40" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 10
        id: tc10
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC10 - gagal tepat setelah mul"
          setup-command: ""
          command: bash -c 'out=$(printf "11 0 30 1 3 3\n" | ./soal2 | tr -d "\r" | sed "s/[[:space:]]*$//"); [[ "$out" == "GAGAL 1 33" ]]'
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          TC1_RESULTS: "${{steps.tc1.outputs.result}}"
          TC2_RESULTS: "${{steps.tc2.outputs.result}}"
          TC3_RESULTS: "${{steps.tc3.outputs.result}}"
          TC4_RESULTS: "${{steps.tc4.outputs.result}}"
          TC5_RESULTS: "${{steps.tc5.outputs.result}}"
          TC6_RESULTS: "${{steps.tc6.outputs.result}}"
          TC7_RESULTS: "${{steps.tc7.outputs.result}}"
          TC8_RESULTS: "${{steps.tc8.outputs.result}}"
          TC9_RESULTS: "${{steps.tc9.outputs.result}}"
          TC10_RESULTS: "${{steps.tc10.outputs.result}}"
        with:
          runners: tc1,tc2,tc3,tc4,tc5,tc6,tc7,tc8,tc9,tc10
